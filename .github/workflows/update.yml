name: Update Al Día

on:
  schedule:
    # 6:00 AM ET = 11:00 UTC (EDT)
    - cron: '0 11 * * *'
    # 2:00 PM ET = 19:00 UTC (EDT)
    - cron: '0 19 * * 1-5'   # tarde solo lunes-viernes
  workflow_dispatch:           # disparo manual desde GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser pytz requests

      # ── Briefing web (Mi Briefing) ──────────────────────────────────────
      - name: Generate web briefing
        run: python fetch_news.py

      # ── Newsletter (Al Día) ─────────────────────────────────────────────
      - name: Generate newsletter
        run: python newsletter.py

      # ── Commit & push ───────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "Al Día Bot"
          git config user.email "bot@aldia.local"    
          git add docs/
          git diff --staged --quiet || git commit -m "📰 Update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
